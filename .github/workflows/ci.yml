name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy DATABASE_URL so `prisma validate` and `next build` don't choke.
  # Real secrets live in Vercel project env, not here.
  DATABASE_URL: "postgresql://user:pass@localhost:5432/pistar"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  lint-typecheck:
    name: Lint / Typecheck / Prisma
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter web exec prisma validate

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Build
        run: pnpm build
